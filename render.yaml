# render.yaml
services:
  - type: web
    name: uniserve-platform
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: uniserve-db
          property: connectionString
      - key: RENDER
        value: "true"

databases:
  - name: uniserve-db
    databaseName: uniserve
    user: uniserve_user
